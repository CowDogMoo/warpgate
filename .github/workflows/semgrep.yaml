---
name: 🚨 Semgrep Analysis
on:
  merge_group:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main
  schedule:
    # Run once a week (see https://crontab.guru)
    - cron: "0 0 * * 0"
  workflow_dispatch:

# Cancel any in-progress job when a new workflow is triggered
concurrency:
  cancel-in-progress: true
  group: pre-commit-${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: 🚨 Semgrep Analysis
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          app-id: "${{ secrets.BOT_APP_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: "${{ steps.app-token.outputs.token }}"

      - name: Run Semgrep analysis
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/secrets \
            --config p/ci \
            --config p/supply-chain \
            --config p/golang \
            --config p/trailofbits-go \
            --sarif \
            --output semgrep-results.sarif \
            || true
          # Semgrep exits non-zero when findings exist; findings are
          # reported via SARIF upload, so we only fail if no output was
          # produced (indicating a real error).
          if [ ! -s semgrep-results.sarif ]; then
            echo "::error::Semgrep failed to produce SARIF output"
            exit 1
          fi

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        if: always()
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep
