---
blueprint:
  name: attack-box
  packer_templates:
    image_values:
      name: kalilinux/kali-rolling
      version: latest
    # AMI specific configurations
    ami:
      instance_type: c4.xlarge
      ssh_username: kali
    # Tags for created odysseys
    tag:
      name: cowdogmoo/attack-box
      version: latest
    # Container specific configurations
    container:
      container_username: kali
      image_hashes:
        - arch: amd64
          os: linux
        - arch: arm64
          os: linux
      registry:
        server: ghcr.io
        username: l50
      workdir: /home/kali
